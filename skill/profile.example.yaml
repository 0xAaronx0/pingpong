# pingpong — dein Such- & Veröffentlichungsprofil.
# Kopieren nach  $PINGPONG_STATE_DIR/profile.yaml  (Default ~/.pingpong/profile.yaml)
# und anpassen. Diese Datei verlässt deinen Rechner NICHT — das Matching läuft lokal.

# Dein ungefährer Standort. Wird zu einer groben Geohash-Zelle (Stadtviertel,
# Präzision 6 ≈ 1.2 km — protokollweit fest) verrechnet; exakte Koordinaten
# werden NIE veröffentlicht.
home:
  lat: 52.5200
  lon: 13.4050

radius_rings: 1        # Suchradius: 0 = nur eigene Zelle, 1 = +8 Nachbarzellen (~3.5 km), 2 = ~6 km

# Aktivitäten, über die du benachrichtigt werden willst. Das Vokabular wächst
# mit der Community — aktuelle Liste: `activities.py`, eigene Vorschläge:
# `activities.py --propose <tag>`. Leere Liste = alles anzeigen.
activities:
  - table_tennis
  - lunch

# Dein Kontakt, der NUR nach beidseitigem Match Ende-zu-Ende-versiegelt
# freigegeben wird. Frei wählbar.
contact:
  telegram: "@dein_handle"
